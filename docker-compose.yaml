services:
  mysql:
    image: mysql:8.0
    container_name: sepay_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3320:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration:
    build: .
    container_name: sepay_migration
    restart: no
    env_file: .env
    environment:
      DB_HOST: mysql
    command: ["npm", "run", "migration:run"]
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build: .
    container_name: sepay_app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
    ports:
      - "3020:3000"
    depends_on:
      mysql:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

volumes:
  mysql_data:
